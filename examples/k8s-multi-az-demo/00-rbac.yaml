# ServiceAccount utilisé par l'init container pour lire les labels du node
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-reader
  namespace: default
---
# ClusterRole : permet de lire les ressources "nodes"
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
# ClusterRoleBinding : associe le ServiceAccount au ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-reader
subjects:
  - kind: ServiceAccount
    name: node-reader
    namespace: default
roleRef:
  kind: ClusterRole
  name: node-reader
  apiGroup: rbac.authorization.k8s.io
