# Service de type LoadBalancer
# → Provisionne automatiquement un OVHcloud Octavia Public Cloud LB
# → IP publique assignée par OVHcloud (visible via `kubectl get svc`)
apiVersion: v1
kind: Service
metadata:
  name: zone-demo
  namespace: default
  labels:
    app: zone-demo
spec:
  type: LoadBalancer
  selector:
    app: zone-demo
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
